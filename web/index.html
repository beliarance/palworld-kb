<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Palworld 1.0 KB</title>
<style>
  :root{--bg:#12141a;--panel:#1b1e27;--panel2:#232733;--text:#e8eaf0;--dim:#9aa1b2;--acc:#5eb1ff;--acc2:#ffd166;--ok:#7ee08a;--bad:#ff7a7a;--border:#2c3140}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.45 -apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
  header{display:flex;align-items:center;gap:16px;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;color:var(--acc2);white-space:nowrap}
  nav{display:flex;gap:4px;flex-wrap:wrap}
  nav button{background:none;border:1px solid transparent;color:var(--dim);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px}
  nav button:hover{color:var(--text)}
  nav button.active{background:var(--panel2);color:var(--acc);border-color:var(--border)}
  main{max-width:1100px;margin:0 auto;padding:18px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  input[type=text],select{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:14px;min-width:220px}
  input[type=text]:focus,select:focus{outline:1px solid var(--acc)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--dim);text-align:left;font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border)}
  td{padding:5px 8px;border-bottom:1px solid #232733}
  tr:hover td{background:#20242f}
  .el{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11.5px;font-weight:600;margin-right:3px}
  .el-Fire{background:#5a2b1c;color:#ffab7d}.el-Water{background:#1c3a5a;color:#8fc7ff}.el-Grass{background:#20452a;color:#93e0a2}
  .el-Electric{background:#4d451a;color:#ffe97d}.el-Ice{background:#1c4550;color:#a5ecff}.el-Ground{background:#4a3520;color:#e6bb8a}
  .el-Dark{background:#332047;color:#cfa5ff}.el-Dragon{background:#2c2560;color:#a8a1ff}.el-Neutral{background:#3a3d46;color:#cfd3dd}
  .tag{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:1px 8px;font-size:12px;color:var(--dim);margin:2px 3px 2px 0}
  .big{font-size:18px;font-weight:700}
  .dim{color:var(--dim)} .ok{color:var(--ok)} .warn{color:var(--acc2)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  h3{margin:4px 0 8px;font-size:14px;color:var(--acc2)}
  .clicky{cursor:pointer;color:var(--acc)} .clicky:hover{text-decoration:underline}
  #loading{padding:40px;text-align:center;color:var(--dim)}
  ul{margin:6px 0;padding-left:20px} li{margin:2px 0}
  .mono{font-variant-numeric:tabular-nums}
  .sub{font-size:12px;color:var(--dim)}
  .indent{margin-left:16px}
  .pc-wrap{position:relative;flex:1 1 240px;min-width:240px}
  .pc-wrap input{width:100%;min-width:0;box-sizing:border-box}
  .pc-dd{position:absolute;z-index:50;left:0;right:0;top:100%;margin-top:3px;max-height:460px;overflow:auto;background:var(--panel2);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.5)}
  .pc-row{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;white-space:nowrap;font-size:15px;border-bottom:1px solid rgba(255,255,255,.04)}
  .pc-row:hover,.pc-row.on{background:var(--border)}
  .pc-row img{width:34px;height:34px;border-radius:50%;flex:0 0 auto}
  .pc-foot{padding:6px 12px;font-size:12px;color:var(--dim);border-top:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <h1>Palworld 1.0 KB</h1>
  <nav id="nav"></nav>
</header>
<main>
  <div id="loading">Загружаю данные…</div>
  <div id="view" style="display:none"></div>
</main>
<script>
"use strict";
const DATA_FILES = {
  combat:"pals_combat.json", chart:"type_chart.json", bosses:"bosses.json",
  breeding:"breeding.json", tiers:"tier_lists.json", items:"items.json",
  exp:"expeditions.json", skills:"active_skills.json", passives:"passives.json",
  loc:"pal_locations.json", res:"resource_nodes.json", idx:"index.json",
  bb:"base_building.json", regions:"regions.json", icons:"icons.json",
  skillmeta:"skill_dps_meta.json"
};
const WORK_COLS = {Kindling:"Разжигание",Watering:"Полив",Planting:"Посадка",Generating_Electricity:"Электричество",
  Handiwork:"Ручной труд",Gathering:"Сбор",Lumbering:"Лесозаготовка",Mining:"Добыча",Medicine:"Медицина",
  Cooling:"Охлаждение",Transporting:"Переноска",Farming:"Ферма"};
const D = {};       // загруженные данные
const P = {};       // объединённые палы по имени
let itemByName = {};

async function loadAll(){
  let csvText;
  if (window.EMBEDDED_DATA){           // автономная сборка (scripts/build_standalone.py)
    Object.assign(D, window.EMBEDDED_DATA);
    csvText = window.EMBEDDED_CSV;
  } else {
    csvText = await (await fetch("../data/palworld_pals.csv", {cache:"no-store"})).text();
    const entries = await Promise.all(Object.entries(DATA_FILES).map(async ([k,f]) =>
      [k, await (await fetch("../data/"+f, {cache:"no-store"})).json()]));
    for (const [k,v] of entries) D[k]=v;
  }
  // CSV → работы
  const lines = csvText.trim().split(/\r?\n/); const head = lines[0].split(",");
  for (const line of lines.slice(1)){
    const c = line.split(","); const r = Object.fromEntries(head.map((h,i)=>[h,c[i]]));
    P[r.Name] = {name:r.Name, number:r.Number, elements:[r.Element_1,r.Element_2].filter(Boolean),
      work:Object.fromEntries(Object.keys(WORK_COLS).filter(w=>r[w]).map(w=>[w,+r[w]]))};
  }
  for (const c of D.combat){
    const p = P[c.name] || (P[c.name]={name:c.name,elements:c.elements,work:{}});
    Object.assign(p,{rarity:c.rarity,hp:c.hp,melee:c.melee_attack,shot:c.shot_attack,def:c.defense,
      ride:c.ride,mount:c.mount_type,mv:c.movement||{},ps:c.partner_skill||{},drops:c.notable_drops||[]});
  }
  itemByName = Object.fromEntries(D.items.items.map(i=>[i.name,i]));
}
const atk = p => Math.max(p.melee||0, p.shot||0);
const els = p => (p.elements||[]).map(e=>`<span class="el el-${e}">${e}</span>`).join("");
const esc = s => String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const palIcon = n => (D.icons?.pals?.[n]) ? `<img src="${D.icons.pals[n]}" loading="lazy" style="width:22px;height:22px;vertical-align:-5px;border-radius:50%;margin-right:2px">` : "";
const structIcon = n => { const k=(D.icons?.structures?.[n])?n:n.split(" (")[0]; const u=D.icons?.structures?.[k]; return u?`<img src="${u}" loading="lazy" style="width:26px;height:26px;vertical-align:-7px;margin-right:4px">`:""; };
const itemIcon = n => (D.icons?.items?.[n]) ? `<img src="${D.icons.items[n]}" loading="lazy" style="width:20px;height:20px;vertical-align:-4px;margin-right:2px">` : "";
const palLink = n => `<span class="clicky" onclick="showPal('${n.replace(/'/g,"\\'")}')">${esc(n)}${P[n]?.number?` <span class="dim">(#${P[n].number})</span>`:""}</span>`;
const itemLink = n => itemByName[n] ? `<span class="clicky" onclick="showItem('${n.replace(/'/g,"\\'")}')">${esc(n)}</span>` : esc(n);

/* Кастомный пал-пикер: иконка + номер + стихии, поиск по подстроке (имя/номер),
   стрелки/Enter/Esc, клик. Заменяет нативный <datalist>. onPick(name) — колбэк выбора. */
let _palNamesSorted=null;
function palCombo(input, onPick){
  if(!input||input.dataset.pc) return; input.dataset.pc="1";
  input.setAttribute("autocomplete","off"); input.removeAttribute("list");
  if(!_palNamesSorted){  // порядок как в паледексе: по номеру (вариант B после базового), безномерные — в конец
    const key=n=>{const s=P[n].number||"";const m=/^(\d+)/.exec(s);return [m?+m[1]:9999,s];};
    _palNamesSorted=Object.keys(P).sort((a,b)=>{const ka=key(a),kb=key(b);return ka[0]-kb[0]||(ka[1]<kb[1]?-1:ka[1]>kb[1]?1:0);});
  }
  const CAP=60;
  const comboIcon=n=>D.icons?.pals?.[n]?`<img src="${D.icons.pals[n]}" loading="lazy">`:`<span style="display:inline-block;width:34px;height:34px;border-radius:50%;background:var(--border);flex:0 0 auto"></span>`;
  const wrap=document.createElement("div"); wrap.className="pc-wrap";
  input.parentNode.insertBefore(wrap,input); wrap.appendChild(input);
  const dd=document.createElement("div"); dd.className="pc-dd"; dd.style.display="none"; wrap.appendChild(dd);
  let items=[], active=-1;
  const render=()=>{
    const q=input.value.trim().toLowerCase();
    const m=_palNamesSorted.filter(n=>n.toLowerCase().includes(q)||String(P[n].number||"").includes(q));  // порядок по номеру сохраняется
    items=m.slice(0,CAP); active=-1;
    dd.innerHTML=(items.map((n,i)=>{const p=P[n];
      return `<div class="pc-row" data-i="${i}">${comboIcon(n)}<span>${esc(n)}</span><span class="dim mono">#${p.number??"—"}</span><span style="margin-left:auto">${els(p)}</span></div>`;
    }).join("")||`<div class="dim" style="padding:8px 12px">нет совпадений</div>`)
      +(m.length>CAP?`<div class="pc-foot">…ещё ${m.length-CAP} — уточни имя или номер</div>`:"");
    dd.style.display="";
  };
  const hl=()=>{[...dd.querySelectorAll(".pc-row")].forEach((r,i)=>r.classList.toggle("on",i===active));
    const el=dd.querySelector(`.pc-row.on`); if(el) el.scrollIntoView({block:"nearest"});};
  const pick=i=>{ if(i<0||i>=items.length) return; input.value=items[i]; dd.style.display="none";
    if(onPick) onPick(items[i]); input.dispatchEvent(new Event("input",{bubbles:true})); };
  input.addEventListener("focus",render);
  input.addEventListener("input",()=>{ if(document.activeElement===input) render(); });  // не открывать при программном restore
  input.addEventListener("keydown",e=>{
    if(dd.style.display==="none") return;
    if(e.key==="ArrowDown"){active=Math.min(active+1,items.length-1);hl();e.preventDefault();}
    else if(e.key==="ArrowUp"){active=Math.max(active-1,0);hl();e.preventDefault();}
    else if(e.key==="Enter"){ if(active>=0){pick(active);e.preventDefault();} else if(items.length===1){pick(0);e.preventDefault();} }
    else if(e.key==="Escape") dd.style.display="none";
  });
  dd.addEventListener("mousedown",e=>{const r=e.target.closest(".pc-row"); if(r){e.preventDefault();pick(+r.dataset.i);}});
  document.addEventListener("click",e=>{ if(!wrap.contains(e.target)) dd.style.display="none"; });
}

/* ---------------- бридинг (порт scripts/query.py) ---------------- */
let rankArr=null, _specialPair=null, _nrCache=null;
function specialChild(a,b){  // ребёнок особой комбинации (O(1)), либо null
  if(!_specialPair){ _specialPair={}; for(const c of D.breeding.special_combos){
    _specialPair[c.parent_a+"|"+c.parent_b]=c.child; _specialPair[c.parent_b+"|"+c.parent_a]=c.child; } }
  return _specialPair[a+"|"+b]||null;
}
function nearestByRank(t){  // вид с рангом, ближайшим к t (tie→меньший ранг); дети спец-комбо исключены
  if(!rankArr){
    const spc=new Set(D.breeding.special_combos.map(c=>c.child));
    rankArr = Object.entries(D.breeding.combi_ranks).filter(([n])=>!spc.has(n))
      .map(([n,r])=>({n,r})).sort((x,y)=>x.r-y.r||(x.n<y.n?-1:1));
    _nrCache={};
  }
  if(t in _nrCache) return _nrCache[t];
  let best=null;
  for(const c of rankArr){ const d=Math.abs(c.r-t); if(!best||d<best.d||(d===best.d&&c.r<best.r)) best={...c,d}; }
  return _nrCache[t]=(best?best.n:null);
}
function breedChild(a,b){
  const br = D.breeding;
  if(a===b) return {child:a, why:"одинаковые родители → тот же вид"};
  const sc=specialChild(a,b);
  if(sc) return {child:sc, why:"особая комбинация (переопределяет формулу)"};
  const R = br.combi_ranks;
  if(!(a in R)||!(b in R)) return {child:null, why:"нет ранга для одного из родителей"};
  const target = Math.floor((R[a]+R[b]+1)/2);
  return {child:nearestByRank(target), why:`формула: floor((${R[a]}+${R[b]}+1)/2)=${target}, ближайший ранг`};
}
/* Кратчайшая цепочка бридинга от одного родителя `start` к виду `target` (BFS по видам).
   Используется, чтобы перенести дроп-онли трейт: держишь трейт-носителя одним родителем
   на каждом шаге, оставляешь потомка, унаследовавшего трейт. */
function breedChain(start, target){
  const R = D.breeding.combi_ranks;
  if(start===target) return {steps:[]};
  if(!(start in R)) return null;
  const partners = Object.keys(R);
  const prev={}; prev[start]=null; const via={};
  const q=[start];
  while(q.length){
    const cur=q.shift();
    for(const b of partners){
      if(b===cur) continue;
      const child=breedChild(cur,b).child;
      if(!child||child in prev) continue;
      prev[child]=cur; via[child]=b;
      if(child===target){
        const steps=[]; let c=target;
        while(prev[c]){ steps.unshift({from:prev[c], partner:via[c], child:c}); c=prev[c]; }
        return {steps};
      }
      q.push(child);
    }
  }
  return null;  // недостижим ранговой формулой
}

/* ---------------- вкладки ---------------- */
const TABS = [
  ["pal","Палы"],["workers","Рабочие"],["breed","Бридинг"],["counter","Каунтеры"],
  ["items","Предметы"],["tiers","Тир-листы"],["exp","Экспедиции"],["res","Ресурсы"],
  ["passives","Пассивки"],["skills","Скиллы"],["party","Пати"],["planner","Конструктор"]
];
let cur="pal";
function nav(){
  document.getElementById("nav").innerHTML = TABS.map(([k,t])=>
    `<button class="${k===cur?'active':''}" onclick="go('${k}')">${t}</button>`).join("");
}
/* Состояние полей каждой вкладки: переживает переключение вкладок и «назад» в браузере.
   Планер исключён — у него своя персистентность (localStorage, PSTORE). */
const TABSTATE=(()=>{ try{ return JSON.parse(sessionStorage.getItem("palkb_tabstate")||"{}"); }catch(e){ return {}; } })();
function saveTabField(e){
  const t=e.target; if(!t.id||cur==="planner") return;
  (TABSTATE[cur]=TABSTATE[cur]||{})[t.id]=t.type==="checkbox"?t.checked:t.value;
  try{ sessionStorage.setItem("palkb_tabstate", JSON.stringify(TABSTATE)); }catch(err){}
}
function restoreTabState(tab){
  if(tab==="planner") return;
  const st=TABSTATE[tab]; if(!st) return;
  for(const [id,v] of Object.entries(st)){           // сначала все значения,
    const el=document.getElementById(id); if(!el) continue;
    if(el.type==="checkbox") el.checked=!!v; else el.value=v;
  }
  for(const id of Object.keys(st)){                  // потом события — draw читает всё разом
    const el=document.getElementById(id); if(!el) continue;
    if(el.type!=="checkbox") el.dispatchEvent(new Event("input",{bubbles:true}));
    el.dispatchEvent(new Event("change",{bubbles:true})); // селекты/таблицы часто слушают change
  }
}
function go(tab, push=true){ cur=tab; nav(); render[tab](); restoreTabState(tab);
  if(push){ try{ history.pushState({tab}, "", "#"+tab); }catch(e){} } }
window.addEventListener("popstate", e=>{
  const st=e.state||{};
  const t=st.tab||location.hash.slice(1)||"pal";
  if(!render[t]) return;
  cur=t; nav(); render[t](); restoreTabState(t);
  if(st.pal) showPal(st.pal,false);
  else if(st.item) showItem(st.item,false);
});
const V = () => document.getElementById("view");
const datalist = (id,names)=>`<datalist id="${id}">${names.map(n=>`<option value="${esc(n)}">`).join("")}</datalist>`;

const render = {};

/* --- Палы --- */
render.pal = () => {
  V().innerHTML = `<div class="card"><div class="row">
    <input type="text" id="palq" placeholder="Имя пала… (например Anubis)" autofocus>
    </div></div><div id="palout"></div>`;
  const q=document.getElementById("palq");
  q.addEventListener("input",e=>{ if(P[e.target.value]) showPal(e.target.value,false); });
  palCombo(q,n=>showPal(n,false));
};
function showPal(name, push=true){
  const p=P[name]; if(!p) return;
  if(cur!=="pal"){ cur="pal"; nav(); render.pal(); }
  const q=document.getElementById("palq"); if(q&&q.value!==name) q.value=name;
  saveTabField({target:q});
  if(push){ try{ const st=history.state||{};
    if(!(st.tab==="pal"&&st.pal===name)) history.pushState({tab:"pal",pal:name},"","#pal");
  }catch(e){} }
  const loc=D.loc.pals[name]||{};
  const learn=(D.skills.learnsets[name]||[]).slice().sort((a,b)=>a.level-b.level);
  const skillBy=Object.fromEntries(D.skills.skills.map(s=>[s.name,s]));
  const work=Object.entries(p.work).sort((a,b)=>b[1]-a[1]).map(([w,l])=>`<span class="tag">${WORK_COLS[w]} <b>${l}</b></span>`).join("")||'<span class="dim">не работает</span>';
  document.getElementById("palout").innerHTML = `
  <div class="card"><div class="big">${palIcon(name)}#${p.number??"?"} ${esc(name)} ${els(p)} <span class="dim">${esc(p.rarity??"")}</span></div>
    <div class="row" style="margin:8px 0"><span class="tag mono">HP ${p.hp}</span><span class="tag mono">ATK ${p.melee}/${p.shot}</span>
    <span class="tag mono">DEF ${p.def}</span>${p.ride?`<span class="tag">🏇 ${p.mount??""} · спринт ${p.mv.sprint??"?"}</span>`:""}</div>
    <div>Работы: ${work}</div>
    ${p.ps.name?`<div style="margin-top:8px"><b>${esc(p.ps.name)}</b>: <span class="dim">${esc(p.ps.effect)}</span></div>`:""}
    ${p.drops.length?`<div style="margin-top:8px">Дропает: ${p.drops.map(itemLink).join(", ")}</div>`:""}
  </div>
  <div class="grid">
    <div class="card"><h3>Где найти</h3>
      ${loc.regions?.length?`<div>Дикие спавны${loc.day_night&&loc.day_night!=="both"?` <span class="warn">(${loc.day_night==="night"?"ночью":"днём"})</span>`:""}: <span class="dim">${loc.regions.map(esc).join("; ")}</span></div>`:""}
      ${(loc.alpha_locations||[]).map(a=>`<div>⭐ ${esc(a)}</div>`).join("")}
      ${loc.egg_types?.length?`<div>🥚 ${loc.egg_types.map(esc).join(", ")}</div>`:""}
      ${(loc.other_sources||[]).map(o=>`<div class="dim">• ${esc(o)}</div>`).join("")}
    </div>
    <div class="card"><h3>Скиллы по уровням</h3>
      ${learn.length?`<table>${learn.map(e=>{const s=skillBy[e.skill]||{};
        return `<tr><td class="mono">${e.level}</td><td>${esc(e.skill)}</td><td><span class="el el-${s.element}">${s.element??""}</span></td><td class="mono">${s.power??""}</td><td class="mono dim">${s.cooldown_seconds?s.cooldown_seconds+"с":""}</td></tr>`;}).join("")}</table>`:`<span class="dim">нет данных</span>`}
    </div>
    <div class="card"><h3>Бридинг</h3>
      <div>Ранг: <b class="mono">${D.breeding.combi_ranks[name]??"—"}</b></div>
      ${D.breeding.special_combos.filter(c=>c.child===name&&c.parent_a!==c.parent_b).map(c=>`<div>⚗️ ${palLink(c.parent_a)} + ${palLink(c.parent_b)}</div>`).join("")||""}
      <div class="sub" style="margin-top:6px">Калькулятор — во вкладке «Бридинг»</div>
    </div>
  </div>`;
}

/* --- Рабочие --- */
render.workers = () => {
  V().innerHTML = `<div class="card"><div class="row">
    <select id="wtask">${Object.entries(WORK_COLS).map(([k,v])=>`<option value="${k}">${v}</option>`).join("")}</select>
  </div></div><div id="wout"></div>`;
  const draw=()=>{
    const col=document.getElementById("wtask").value;
    const rows=Object.values(P).filter(p=>p.work[col])
      .sort((a,b)=>b.work[col]-a.work[col]||Object.values(b.work).reduce((s,x)=>s+x,0)-Object.values(a.work).reduce((s,x)=>s+x,0));
    document.getElementById("wout").innerHTML=`<div class="card"><table>
      <tr><th>Ур.</th><th>Пал</th><th>Стихии</th><th>Другие работы</th></tr>
      ${rows.slice(0,30).map(p=>`<tr><td class="mono big">${p.work[col]}</td><td>${palLink(p.name)}</td><td>${els(p)}</td>
        <td class="dim">${Object.entries(p.work).filter(([w])=>w!==col).sort((a,b)=>b[1]-a[1]).map(([w,l])=>`${WORK_COLS[w]} ${l}`).join(", ")}</td></tr>`).join("")}
    </table></div>`;
  };
  document.getElementById("wtask").addEventListener("change",draw); draw();
};

render.breed = () => {
  const names=Object.keys(P).sort();
  const MODES=[
    ["pair","🍳 Пара → потомок","Укажи двух родителей — покажу, кто родится."],
    ["target","🎯 Кого хочу → пары","Укажи желаемого пала — все пары, дающие его за 1 скрещивание (пары из легкодоступных палов — выше)."],
    ["chain","🧬 Цепочка (привить трейт)","Старт-родитель (носитель дроп-онли трейта, напр. Craftsmanship/Legend) + цель → цепочка скрещиваний. На каждом шаге держи трейт-носителя одним родителем и оставляй потомка, унаследовавшего трейт."]];
  const help=Object.fromEntries(MODES.map(m=>[m[0],m[2]]));
  V().innerHTML = `
  <div class="card">
    <div class="row" id="bmode">${MODES.map(([m,t])=>`<button data-m="${m}" class="bmbtn" style="border:1px solid transparent;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;background:none;color:var(--dim)">${t}</button>`).join("")}</div>
    <div class="sub" id="bmodehelp" style="margin-top:6px"></div>
    <div id="binputs" style="margin-top:8px"></div>
  </div>
  <div id="bout"></div>
  ${breedFaqHtml()}`;
  const val=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
  const draw=()=>{
    const out=document.getElementById("bout"); if(!out) return;
    if(breedMode==="pair"){
      const a=val("bp_a"), b=val("bp_b");
      if(!P[a]||!P[b]){ out.innerHTML=`<div class="card dim">Введи двух родителей.</div>`; return; }
      const r=breedChild(a,b);
      out.innerHTML=`<div class="card"><div class="big">${palIcon(a)}${palLink(a)} + ${palIcon(b)}${palLink(b)} = ${r.child?`<span class="ok">${palIcon(r.child)}${palLink(r.child)}</span>`:'<span class="bad">—</span>'}</div>
        <div class="sub">${esc(r.why)}</div>${r.child?childInfo(r.child):""}</div>`;
    } else if(breedMode==="target"){
      const t=val("bt_target"), w=val("bt_with");
      if(!P[t]){ out.innerHTML=`<div class="card dim">Введи, кого хочешь получить.</div>`; return; }
      const combos=D.breeding.special_combos.filter(c=>c.child===t&&c.parent_a!==c.parent_b);
      const spc=new Set(D.breeding.special_combos.map(c=>c.child));
      let html=`<div class="card"><div class="big">🎯 Как получить ${palIcon(t)}${palLink(t)}</div>${childInfo(t)}`;
      if(combos.length) html+=`<div style="margin-top:8px">⚗️ Особые комбинации:</div>`+combos.map(c=>`<div>${palLink(c.parent_a)} + ${palLink(c.parent_b)}</div>`).join("");
      html+=`<div style="margin-top:8px">👥 ${palLink(t)} + ${palLink(t)} <span class="dim">(одинаковая пара всегда даёт тот же вид)</span></div>`;
      if(spc.has(t)&&!combos.length){ html+=`<div class="dim" style="margin-top:6px">Особый вид — ранговой формулой не выводится, только спец-комбо/одинаковой парой.</div>`; }
      else if(!spc.has(t)){
        const R=D.breeding.combi_ranks, ns=Object.keys(R), pairs=[];
        const As=P[w]?[w]:ns;
        outer: for(const a of As){ for(const b of ns){
          if(!P[w]&&a>=b) continue; if(a===t||b===t) continue;
          if(breedChild(a,b).child===t){ pairs.push([a,b]); if(pairs.length>=600) break outer; } } }
        pairs.sort((x,y)=>(wildCatch(y[0])+wildCatch(y[1]))-(wildCatch(x[0])+wildCatch(x[1])));
        if(pairs.length) html+=`<div style="margin-top:8px">🍳 Пары по формуле (${pairs.length>=600?"600+":pairs.length}${P[w]?`, с ${esc(w)}`:""}, легкодоступные выше):</div>
          <div style="margin-top:4px">${pairs.slice(0,40).map(([a,b])=>`<span class="tag">${palLink(a)} + ${palLink(b)}${wildCatch(a)&&wildCatch(b)?" 🎯":""}</span>`).join("")}</div>
          ${pairs.length>40?`<div class="sub">…показаны 40 из ${pairs.length>=600?"600+":pairs.length}</div>`:""}`;
      }
      out.innerHTML=html+`</div>`;
    } else {  // chain
      const s=val("bc_start"), t=val("bc_target");
      if(!P[s]||!P[t]){ out.innerHTML=`<div class="card dim">Введи стартового родителя (носителя трейта) и финальный вид.</div>`; return; }
      if(s===t){ out.innerHTML=`<div class="card">${palLink(s)} — уже нужный вид. Разводи парой ${palLink(t)} + ${palLink(t)}, оставляя потомка с трейтом.</div>`; return; }
      const res=breedChain(s,t);

function craftTree(name, qty, depth, out, raw){
  const it=itemByName[name], r=it?.recipe;
  if(r && depth<6){
    out.push({depth,name,qty,station:r.station||"?"});
    for(const [m,q] of Object.entries(r.materials)) craftTree(m,q*qty,depth+1,out,raw);
  } else raw[name]=(raw[name]||0)+qty;
}
function showItem(name, push=true){
  const it=itemByName[name]; if(!it) return;
  if(cur!=="items"){ cur="items"; nav(); render.items(); }
  const q=document.getElementById("itemq"); if(q&&q.value!==name) q.value=name;
  saveTabField({target:q});
  if(push){ try{ const st=history.state||{};
    if(!(st.tab==="items"&&st.item===name)) history.pushState({tab:"items",item:name},"","#items");
  }catch(e){} }
  let html=`<div class="card"><div class="big">${itemIcon(it.name)}${esc(it.name)} <span class="tag">${esc(it.category)}</span>${it.tech_level?`<span class="tag">tech ${it.tech_level}</span>`:""}</div>`;
  if(it.recipe){
    const mats=Object.entries(it.recipe.materials).map(([m,q])=>`${itemLink(m)} ×${q}`).join(", ");
    html+=`<div style="margin-top:6px">Крафт: <b>${esc(it.recipe.station||"станция не указана")}</b> ← ${mats}</div>`;
    const steps=[],raw={};
    steps.push({depth:0,name:it.name,qty:1,station:it.recipe.station||"?"});
    for(const [m,q] of Object.entries(it.recipe.materials)) craftTree(m,q,1,steps,raw);
    html+=`<h3 style="margin-top:10px">Разложение до сырья</h3>`;
    html+=steps.map(s=>`<div class="mono" style="margin-left:${s.depth*16}px">${esc(s.name)} ×${s.qty} <span class="dim">@ ${esc(s.station)}</span></div>`).join("");
    html+=`<div style="margin-top:6px"><b>Итого сырьё:</b> ${Object.entries(raw).sort().map(([m,q])=>`<span class="tag">${itemLink(m)} ×${q}</span>`).join("")}</div>`;
  } else html+=`<div class="dim" style="margin-top:6px">Не крафтится (или рецепт неизвестен).</div>`;
  if(it.obtained_from?.length) html+=`<h3 style="margin-top:10px">Где достать</h3><ul>${it.obtained_from.map(s=>`<li>${esc(s)}</li>`).join("")}</ul>`;

  html+="</div>";
  document.getElementById("iout").innerHTML=html;
}

/* ДПМ пала из его ленсета = power x 60/max(кулдаун,5), x2 к стихии слабости.
   baseline CD 5 (методология thepalprofessor) не даёт спам-скиллам с мелким кд раздуть ДПМ.
   ВНИМАНИЕ: это оценка по ОДИНОЧНОЙ цели; по большому боссу решает мульти-хит —
   см. metaSkillsCardHTML (замеренный DPS сообщества, skill_dps_meta.json) */
const skillDPM=(s,mult)=>Math.round((mult||1)*s.power*60/Math.max(s.cooldown_seconds||60,5));
function bestSkillsFor(name, enemy, n=3){
  const learn=D.skills.learnsets[name]||[];
  const by=Object.fromEntries(D.skills.skills.map(s=>[s.name,s]));
  const bonus=enemy?(D.chart.chart[enemy]||{}).weak_to||[]:[];
  return learn.map(e=>({lv:e.level,s:by[e.skill]})).filter(r=>r.s&&r.s.power&&r.s.cooldown_seconds)
    .map(r=>({...r,mult:bonus.includes(r.s.element)?2:1,dpm:skillDPM(r.s,bonus.includes(r.s.element)?2:1)}))
    .sort((a,b)=>b.dpm-a.dpm).slice(0,n);
}
/* мета-скиллы под босса: замеренный сообществом DPS (skill_dps_meta.json).
   fe = стихия каунтера (если есть слабость), иначе null → показываем универсальный топ */
function metaSkillsCardHTML(fe, enemy){
  const meta=D.skillmeta; if(!meta||!meta.skills) return "";
  const learned=Object.keys(D.skills.learnsets);
  const acq={exclusive:"эксклюзив",breeding:"бридинг",fruit:"Skill Fruit",melee:"ближний бой",learn:"по уровню"};
  const byLarge=[...meta.skills].sort((a,b)=>(b.dps_large||0)-(a.dps_large||0));
  // ровные all-rounder'ы (учатся любому палу, работают на любом хитбоксе) — безопасный филл
  const flats=byLarge.filter(s=>!s.multi_hit&&(s.dps_small||0)>=30&&["fruit","breeding"].includes(s.acquire));
  let picks;
  if(fe) picks=byLarge.filter(s=>s.element===fe).slice(0,3);   // каунтер-стихия (x2 сверху)
  else   picks=byLarge.slice(0,4);                              // бестиповый → топ по большому хитбоксу
  for(const f of flats){ if(picks.length>=5) break; if(!picks.includes(f)) picks.push(f); }
  if(!picks.length) return "";
  const ratio=s=>(s.multi_hit&&s.dps_large&&s.dps_small)?`×${(s.dps_large/s.dps_small).toFixed(1)} по большому телу`:"";
  const row=s=>`<div style="margin-top:6px"><b>${esc(s.skill)}</b> <span class="el el-${s.element}">${s.element}</span>
    <span class="mono">${s.dps_large!=null?s.dps_large+" DPS/большой":""}${s.dps_small!=null?" · "+s.dps_small+" DPS/мелкий":""}</span>
    ${fe&&s.element===fe?'<span class="tag">×2 к слабости</span>':""}${s.multi_hit?`<span class="tag">мульти-хит ${ratio(s)}</span>`:""} <span class="dim">${acq[s.acquire]||s.acquire}${s.pal?" — "+esc(s.pal):""}</span>
    <div class="sub">${esc(s.note||"")}</div></div>`;
  return `<div class="card"><div class="big">🎯 Мета-скиллы под босса ${fe?`(каунтер ${fe})`:"(бестиповый)"}</div>
    <div class="sub">Замеренный сообществом DPS. По большому телу босса мульти-хит скиллы бьют многократно — это важнее номинального урона. Учи бойцу через Skill Fruit/бридинг.</div>
    ${picks.map(row).join("")}
    <div class="sub" style="margin-top:8px">💡 ${(meta.guidance||[]).slice(0,2).map(esc).join(" · ")} <span class="dim">(гайды 1.0, PRELIMINARY)</span></div></div>`;
}
function fruitSkillsFor(name, enemy, n=2){
  const learned=new Set((D.skills.learnsets[name]||[]).map(e=>e.skill));
  const bonus=enemy?(D.chart.chart[enemy]||{}).weak_to||[]:[];
  return D.skills.skills
    .filter(s=>s.skill_fruit_exists&&s.power>=300&&s.cooldown_seconds&&!learned.has(s.name)
      &&(bonus.length?bonus.includes(s.element):true))
    .map(s=>({...s,_dpm:skillDPM(s,bonus.includes(s.element)?2:1)}))
    .sort((a,b)=>b._dpm-a._dpm).slice(0,n);
}
function skillChipsHTML(name, enemy, isFighter){
  const best=bestSkillsFor(name, enemy);
  if(!best.length) return "";
  const chip=r=>`<span class="tag" title="${esc(r.s.description||"")}">${esc(r.s.name)} <span class="el el-${r.s.element}">${r.s.element}</span> <span class="mono">${r.s.power}/${r.s.cooldown_seconds}с</span>${r.mult>1?" ×2":""} <b class="mono">${r.dpm} DPM</b> <span class="dim">Lv${r.lv}</span></span>`;
  let html=`<div style="margin-top:6px">⚡ скиллы (ДПМ по одиночной цели): ${best.map(chip).join(" ")}</div>`;
  if(isFighter){
    const fr=fruitSkillsFor(name, enemy);

  }
  return html;
}
/* фабрика сборки пати: pick по тегам index.json, add вручную */
function partyBuilder(){
  const B={picks:[],used:new Set(),notes:[]};
  const inv=D.idx.inverted.partner_tags;
  B.pick=(role,...tags)=>{
    let first=null; const alts=[];
    for(const t of tags) for(const n of (inv["party:"+t]||[]).concat(inv[t]||[])){
      if(B.used.has(n)) continue;
      if(!first) first=n; else if(!alts.includes(n)&&alts.length<3&&n!==first) alts.push(n);
    }
    if(first){ B.used.add(first); B.picks.push({n:first,role,alts}); }
    return first;
  };
  B.add=(n,role,alts=[])=>{ if(n){ B.used.add(n); B.picks.push({n,role,alts}); } };
  B.weightless=false;
  B.pickWeight=(role,...tags)=>B.weightless?null:B.pick(role,...tags);  // слот веса: пропуск при «без веса»
  B.backfill=(target)=>{  // добить пати полезными аурами (после снятых весовых слотов), без дубля ролей
    for(const [role,...tags] of [["выживание: хил/сустейн","survival"],
        ["бафф игрока: +Attack","player_atk_unique","player_atk"],
        ["стак с пуль: +ATK/DEF активному палу (Orserk)","bullet_stack","cd_support"]]){
      if(B.picks.length>=target) break;
      const tagPals=new Set(tags.flatMap(t=>(inv["party:"+t]||[]).concat(inv[t]||[])));
      if(B.picks.some(p=>tagPals.has(p.n))) continue;  // роль уже покрыта — пропуск
      B.pick(role,...tags);
    }
  };
  B.topFighter=el=>{
    const pool=Object.values(P).filter(p=>p.hp&&!B.used.has(p.name)&&(!el||p.elements.includes(el)))
      .sort(fighterCmp);
    return pool.length?pool[0].name:null;
  };
  return B;
}
/* боевая пати: боец стихии fe против врага enemy (общая для вкладок Пати и Каунтеры) */
function buildCombatParty(fe, enemy, two, sea){
  const chart=D.chart.chart, B=partyBuilder();

  B.add(f1,`⚔ боец ${fe} (выпускаешь его)`+(sea&&f1p.mount?` — ${f1p.mount==="flying"?"летающий":"плавающий"} маунт`:""),
    fePool().filter(p=>p.name!==f1).slice(0,3).map(p=>p.name));
  B.picks[0].fighter=true;
  B.pick(`аура: +15~30% атаки ${fe}-палам`,`elem_team_atk:${fe}`,`weak_point:${fe}`,"weak_point:any");
  B.pick("стак с пуль: +ATK/DEF активному палу (до x30)","bullet_stack","cd_support");
  // усиление твоей атаки: смена стихии (метка верна) ИЛИ, если такого пала нет, просто +Attack
  if(!B.pick(`бафф игрока: атаки становятся ${fe}`,`attack_type:${fe}:active`,`attack_type:${fe}:mount`))
    B.pick("бафф игрока: +Attack","player_atk_unique","player_atk");
  if(two){
    let n=null;
    if(sea){ const c=fePool().find(p=>p.mount==="swim")||fePool().find(p=>p.mount==="flying");
      if(c){ B.add(c.name, `2-й боец — ${c.mount==="swim"?"плавающий":"летающий"} маунт (свап)`); n=c.name; } }
    if(!n) n=B.pick("2-й боец: гибрид (сам дерётся + стак-аура)",`stack_atk:${fe}`);
    if(!n) B.add(B.topFighter(fe),"2-й боец (запасной)");
    B.picks[B.picks.length-1].fighter=true;
  } else if(enemy) B.pick(`аура: резист от ${enemy} (стихия врага)`,`resist:${enemy}`,`elem_team_def:${fe}`,"survival");
  else B.pick(`аура: живучесть (${fe} без стихийного бонуса)`,`elem_team_def:${fe}`,"survival");
  if(sea) B.notes.push("Арена — открытое море: плавающий пал ОБЯЗАТЕЛЕН; летающий маунт помогает пережить цунами <span class='dim'>(player-reported)</span>");
  B.notes.push("⚡ скиллы у карточек — оценка по ОДИНОЧНОЙ цели (урон × 60/кулдаун). По большому боссу решает мульти-хит → смотри блок «🎯 Мета-скиллы» ниже (замеренный DPS)");
  if(enemy) B.notes.push(`Пати против <b>${enemy}</b>-врагов (${fe} бьёт ${(chart[fe].strong_vs||[]).join(", ")||"—"}); сам ${fe} каунтерится ${(chart[fe].weak_to||[]).join(", ")||"—"}`);
  else B.notes.push(`${fe} не даёт стихийного бонуса урона (нет strong_vs) — универсальный боец; сам каунтерится ${(chart[fe].weak_to||[]).join(", ")||"—"}`);
  if(B.picks.some(p=>p.n==="Orserk")) B.notes.push("Orserk (#187): стаки дают ПУЛИ — стреляй очередями; Drone Launcher (tech 77, 9 дронов, без патронов) набивает стаки сам, в руках держи Mechanical Bow (tech 67) под сингл-таргет <span class='dim'>(мета-гайды июля 2026, PRELIMINARY)</span>");
  if(B.picks.some(p=>p.n==="Solenne")) B.notes.push("Solenne: +30~80% атаки игрока ТОЛЬКО если все 5 палов разных видов — не бери дублей");
  B.notes.push("Глайдер-пал не нужен: в 1.0 есть Wing Pack (слот глайдера) и Air Dash Boots — слот пати не трать <span class='dim'>(гайды 1.0)</span>");
  return B;
}
/* подбор аксессуаров по эффектам items.json (goal + стихия бойца/врага) */
function accessoriesFor(goal, fe, enemy, weightless){
  const acc=D.items.items.filter(i=>i.category==="accessory"&&i.effect);
  const find=re=>acc.find(i=>re.test(i.effect));
  const out=[];
  const push=(it,why)=>{ if(it&&!out.some(o=>o.n===it.name)) out.push({n:it.name,why,eff:it.effect}); };
  if(goal==="combat"){
    push(find(new RegExp(`Pal Attack Up.*${fe} Damage Enhancement|${fe} Damage Enhancement.*Pal Attack Up`,"s")),
      `бойцу: +атака и +${fe}-урон (батон)`);
    push(find(new RegExp(`Pal Defense Up.*${fe} Damage Enhancement|${fe} Damage Enhancement.*Pal Defense Up`,"s")),
      `бойцу: +защита и +${fe}-урон (талисман)`);
    if(enemy) push(find(new RegExp(`reduces incoming ${enemy} damage of the Pal`)),
      `бойцу: резист от ${enemy} (кольцо)`);
    push(find(/raises your Attack, and that of the Pal/), "тебе и палу: +атака (эмблема)");
    if(enemy) push(acc.find(i=>i.name===`Ring of ${enemy} Resistance`), `тебе: резист от ${enemy}`);
  } else if(goal==="catch"){
    push(find(/Reveals hidden Pal potentials.*Mercy Hit|Mercy Hit.*Reveals/s)||find(/Mercy Hit/),
      "не убьёшь цель: урон не опускает HP ниже 1 (Mercy Hit)");
    push(acc.find(i=>i.name==="Ring of Trust"), "быстрее растёт доверие палов");
  } else if(goal==="loot"||goal==="eggs"||goal==="fishing"){
    if(!weightless){
      push(find(/Max Carrying Capacity Lv\. 4.*work speed|work speed.*Max Carrying/s)||find(/Max Carrying Capacity/),
        "вес: грузоподъёмность");
      push(find(/Heat and Cold Resistance.*carrying capacity/s), "вес + климат (для дальних ранов)");
    }
    if(goal==="loot") push(find(/raises your Attack, and that of the Pal/), "тебе и палу: +атака (эмблема)");
  } else if(goal==="explore"){
    push(find(/quadruple dashes|triple dashes/)||find(/dash in mid-air/), "мобильность: воздушные дэши");
    push(acc.find(i=>i.name==="Night Vision Goggles"), "ночное зрение");
    push(find(/Heat and Cold Resistance.*Health/s), "климат + HP");
  } else if(goal==="xp"){
    push(find(/raises Pal EXP/), "+EXP палам");
  } else if(goal==="openworld"){
    push(find(/Heat and Cold Resistance.*carrying capacity/s), "климат + вес");
    push(find(/extends the invincibility period/), "длиннее i-frames доджа");
  }
  return out;
}

/* бойцов ранжируем консенсусом тир-листов (fighters#N из tier_lists), затем атакой:

const fighterRank=p=>{const h=(D.idx.pals[p.name]||{}).tier_hits||[];
  const m=h.find(x=>x.startsWith("fighters#")); return m?+m.slice(9):999;};
const fighterCmp=(a,b)=>fighterRank(a)-fighterRank(b)||atk(b)-atk(a)||(b.hp+b.def)-(a.hp+a.def);
/* raw-пати: босс без стихийного каунтера — топ по статам, наименее уязвимая обвязка.
   exclude: сам босс (Not catchable); sea: морская арена (swim обязателен, flyer от цунами) */

  B.picks[0].fighter=true;
  let f2;
  if(sea){ f2=pool().find(p=>p.mount==="swim"); }
  if(!f2) f2=pool()[0];
  const alts2=(sea?pool().filter(p=>p.mount==="swim"):pool()).filter(p=>p.name!==f2.name).slice(0,3).map(p=>p.name);
  B.add(f2.name, sea?"⚔ 2-й боец + плавающий маунт (морская арена) — свап":"⚔ 2-й боец (свап)", alts2);
  B.picks[1].fighter=true;

  if(B.picks.some(p=>p.n==="Solenne")) B.notes.push("Solenne: +30~80% атаки игрока ТОЛЬКО если все 5 палов разных видов");
  B.notes.push("⚡ скиллы у карточек — оценка по одиночной цели. По большому боссу решает мульти-хит → смотри блок «🎯 Мета-скиллы» ниже (замеренный DPS)");
  return B;
}

    B.pick("бафф игрока: +Attack","player_atk_unique","player_atk");
    B.notes.push(`Фармим <b>${enemy}</b>-палов (селект «враг» меняет цель); лут-ауры есть под каждую стихию`);
  } else if(goal==="eggs"){
    B.pick("45~55% шанс альфа-яйца при подборе","egg_alpha_chance");
    B.pick("50~75% шанс второго яйца","egg_extra_pickup");
    const m=Object.values(P).filter(p=>p.mount==="flying"&&!B.used.has(p.name)).sort((a,b)=>(b.mv.sprint||0)-(a.mv.sprint||0));
    if(m.length) B.add(m[0].name,"летающий маунт: облёт точек яиц",m.slice(1,4).map(p=>p.name));
    B.pickWeight("вес","weight");
    B.pick("страховка: хил/защита","survival");
    B.notes.push("Ауры яиц работают при ПОДБОРЕ яйца — держи обоих в пати весь маршрут");
  } else if(goal==="xp"){
    B.pick("аура: +40~80% EXP всем палам пати","exp_boost");
    B.add(B.topFighter(),"боец-убийца: фармит килы, пока качаемые сидят в пати");
    B.picks[B.picks.length-1].fighter=true;
    B.pick("бафф игрока: +Attack (ты выносишь толпы быстрее)","player_atk_unique","player_atk");
    B.notes.push("Остальные 2 слота — <b>качаемые палы</b>: экспа с каждого кила капает всем в пати");
    B.notes.push(`Аксессуар игрока: ${itemLink("Growth Acceleration Bell")} (Pal EXP Up Lv.3) — Ingot x25 + Paldium Fragment x30 + Mysterious Mushroom x10 + Ancient Civ. Parts x3 (High Quality Workbench); точный % на paldb не указан`);
    B.notes.push("Ещё быстрее: Applied Technique Handbook (+уровень работ) и Statue of Power — это не EXP, но качает силу");
  } else if(goal==="explore"){
    const biome=document.getElementById("pbiome").value;
    if(biome==="cold") B.pick("+2 Cold Resistance","climate_cold");
    if(biome==="heat"){ B.pick("+2 Heat Resistance","climate_heat"); B.pick("+50~100% скорость по песку (маунт)","terrain:sand"); }
    B.pick("детект данжей/сундуков/скрапа","detect");
    B.pick("открывает сундуки без ключей","treasure_open");
    B.pick("инвиз для игрока и пала","stealth");
    const m=Object.values(P).filter(p=>p.mount==="flying"&&!B.used.has(p.name)).sort((a,b)=>(b.mv.sprint||0)-(a.mv.sprint||0));
    while(B.picks.length<5&&m.length) B.add(m.shift().name,"летающий маунт");
  }
  if(weightless&&["loot","fishing","eggs"].includes(goal)){
    if(goal==="fishing"){  // рыбалка — не бой: быстрый маунт до точек лова вместо сустейна
      const fm=Object.values(P).filter(p=>p.mount==="flying"&&!B.used.has(p.name)).sort((a,b)=>(b.mv.sprint||0)-(a.mv.sprint||0));
      if(fm.length) B.add(fm[0].name,"быстрый летающий маунт — добраться до точек лова");
      B.notes.push("Настройка мира «без веса»: слот грузоподъёмности заменён на быстрый маунт (до точек лова)");
    } else {
      B.backfill(5);
      B.notes.push("Настройка мира «без веса»: слоты грузоподъёмности убраны, заменены на сустейн/атаку");
    }
  }
  out.innerHTML=partyCardsHTML(B.picks, B.notes, enemyForSkills)+accessoryCardHTML(accessoriesFor(goal, null, enemyForSkills, weightless));
}

/* --- Конструктор баз (порт scripts/base_planner.py) --- */
const QUALITY = {baseline:1.0, passives:2.2, max:2.75};
const METALS = {"ingot":33,"refined":43,"pal-metal":57,"coralum":65,"soralite":73,"paloxite":99};
const TRANS_CAP = {1:2,2:5,3:10,4:20,5:40,6:70,7:120,8:200,9:320,10:500};
const sizeBadge = n => { const sz=(D.idx.pals[n]||{}).size; return sz?` <span class="tag" style="padding:0 5px;font-size:10.5px">${sz}</span>`:""; };
function crewGroup(c){
  const r=(c.role||"");
  if(/саппорт/i.test(r)) return "🎯 Саппорт";
  if(c.for==="Ranch"||/ранч/i.test(r)) return "🐄 Ранчо";
  if(c.task==="Transporting"||/транспорт/i.test(r)) return "📦 Транспорт";
  if(/ЕДА|повар|салат/i.test(r)) return "🍽 Еда";
  if(/добыча|шахтёр|лесопилк|Synthesizer/i.test(r)||c.task==="Mining"||c.task==="Lumbering") return "⛏ Добыча";
  if(/посадка|полив|сбор|мельница|плантаци/i.test(r)||["Planting","Watering","Gathering"].includes(c.task)) return "🌾 Ферма";
  if(/родителей|ферм|Hatchery/i.test(r)) return "🥚 Бридинг";
  if(/сборочн|верстак|печи|Workbench|торт/i.test(r)||["Handiwork","Kindling"].includes(c.task)) return "🔧 Крафт";
  if(/медик|электрик|холодильник/i.test(r)||["Medicine","Generating_Electricity","Cooling"].includes(c.task)) return "🏥 Инфраструктура";
  return "❓ Прочее";
}
function transInfo(n){ const p=D.idx.pals[n]||{}; const t=p.work?.Transporting;
  if(!t) return null; const cap=TRANS_CAP[t]||0;
  // гружёные ходят ШАГОМ (подтверждено игроком) — пропускная = вместимость x шаг
  return {cap, walk:p.walk||0, run:p.run||0, score:cap*(p.walk||0)}; }

class BasePlan {
  constructor(o){ this.o=o; this.structs=Object.fromEntries(D.bb.structures.map(s=>[s.name,s]));
    this.regions=D.regions.regions||{}; this.buildings={}; this.crew=[]; this.notes=[]; this.assume=[]; }
  foodWs(){ const b=this.o.foodBuff??30;
    if(b<=0) return 0;
    return this.o.tech>=((this.structs["Tomato Plantation"]||{}).tech_level||25)?b:0; }
  q(){ const star=this.o.stars?1.55:1.0, research=this.o.research?1.45:1.0;
    // 4★ ≈ ×1.55; ресёрч (Pal Labor Research Lab макс) Work Speed +45%
    return (70*QUALITY[this.o.workforce]+this.foodWs())/70*star*research; }
  // ранч = q() × бонус Ranch Master(+2 Farming)/handbook при палах с пассивками (×1.5)
  ranchMult(){ return this.q()*(this.o.workforce!=="baseline"?1.5:1.0); }
  // садовая тройка = q() × суитабилити-саппорты (Petallia +1 Planting, Amione +1 Watering — в брид-пресете) ≈ ×1.35
  gardenMult(){ return this.q()*1.35; }
  // грядка/час: yield-саппорты — ПАРТНЁРКИ, сила от звёзд (диапазон = 0★…4★): Lullu рост +50/70%, Prunelia урожай +18/35%; × ресёрч Harvest +50%
  plantYieldEff(){ const g=this.o.stars?1.70:1.50, y=this.o.stars?1.35:1.18; return (this.o.plantYield||60)*g*y*(this.o.research?1.5:1.0); }
  best(cands){ const a=cands.filter(c=>this.structs[c]&&(this.structs[c].tech_level||0)<=this.o.tech); return a[a.length-1]||null; }
  add(n,c=1){ if(n&&c>0) this.buildings[n]=(this.buildings[n]||0)+c; }
  hire(sp,c,role,task){ if(c>0) this.crew.push([sp,Math.ceil(c),role,task||null]); }
  easyGet(n){ const p=D.idx.pals[n]||{}; return (p.regions||[]).some(r=>!r.includes("World Tree")&&!r.includes("Sunreach")); }
  hint(n){ const p=D.idx.pals[n]||{}; const regs=(p.regions||[]).filter(r=>!r.includes("World Tree"));
    if(regs.length){ const base=regs[0].replace(/\s*\[Lv\.[^\]]*\]$/,"").trim(); const c=this.regions[regs[0]]||this.regions[base];
      return `ловится: ${regs[0]}`+(c?` (${c[0]}, ${c[1]})`:""); }
    if((p.alpha||[]).length) return "альфа: "+p.alpha[0].split(" - ").pop();
    return (p.get_via||[]).slice(-1)[0]||""; }
  addPlantations(plantsN, PL){
    const total=Object.values(plantsN).reduce((a,b)=>a+b,0);
    if(this.o.tech>=78&&this.structs["Ancient Farm"]&&total){
      const afy=this.o.ancientFarmYield||3; let nAf=0;
      for(const [crop,n] of Object.entries(plantsN)){ const k=Math.max(1,Math.ceil(n/afy)); this.add(`Ancient Farm (${crop})`,k); nAf+=k; }
      this.notes.push(`Ancient Farm x${nAf} (по культурам) вместо раздельных плантаций: компактнее, 4 места, Watering+Planting+Gathering 6+. `+
        `Принято ×${afy} к выработке (калибровка по игроку: 4 древние фермы кормят 50 палов с избытком; точной цифры нет — поле «Ancient Farm ×»)`);
    } else for(const [crop,n] of Object.entries(plantsN)){ const pl=this.best([PL[crop]]); if(pl) this.add(pl,n); }
    return total;
  }
  hireTransport(){
    const prod=Object.entries(this.buildings).filter(([n])=>{
      const st=this.structs[n]||{}; return st.workers||/Plantation|Ranch|Mill|Kitchen|Furnace|Workbench|Assembly|Pit|Site|Mine|Quarry|Farm|Pot|Oven/.test(n);
    }).reduce((a,[,c])=>a+c,0);
    const n=Math.max(1,Math.ceil(prod/8));
    const ranked=(D.idx.inverted.work.Transporting||[]).map(([nm])=>[nm,transInfo(nm)])
      .sort((a,b)=>b[1].score-a[1].score);
    const [top,ti]=ranked[0];
    this.hire(top,n,`транспорт: несёт ${ti.cap}, шаг(гружён) ${ti.walk} (пропускная ${(ti.score/1000).toFixed(1)}k) — добивка к самовывозу`,"Transporting");
    this.assume.push(`Транспорт: ${n} выделенных на ${prod} зданий (1 на ~8). Рабочие палы с навыком Transporting сами носят выхлоп в простое — выделенных нужно мало`);
  }
  hireBest(task,minLv,count,role){
    const ranked=D.idx.inverted.work[task]||[]; if(!ranked.length) return;
    const top=(ranked.find(([n,lv])=>lv>=minLv)||ranked[0])[0];
    const easyRow=ranked.find(([n,lv])=>lv>=minLv&&this.easyGet(n))||ranked.find(([n])=>this.easyGet(n));
    const easy=easyRow?easyRow[0]:top;
    const lv=Object.fromEntries(ranked);
    const [prim,alt]=this.o.roster==="easy"?[easy,top]:[top,easy];
    let note=`${role} (${task} ${lv[prim]})`;
    if(alt!==prim){ const tag=this.o.roster==="easy"?"топ":"проще"; note+=` | ${tag}: ${alt} (#${(D.idx.pals[alt]||{}).number}, ${lv[alt]})`; }
    if(!this.easyGet(prim)){ const h=this.hint(prim); if(h) note+=` [${h}]`; }
    this.hire(prim,count,note,task); }
  supportCore(kinds){ const tags=D.idx.inverted.partner_tags;
    for(const [kind,why] of kinds) for(const n of (tags["base_support:"+kind]||[]).slice(0,1)){
      const h=this.hint(n); this.hire(n,1,`саппорт: ${why}`+(h?` [${h}]`:"")); } }
  rosterAppetite(){ const fa=D.bb.pal_food_amount;
    return this.crew.reduce((a,c)=>a+c[1]*(fa[c[0]]||5),0); }
  foodModule(slots, shareCrew){
    // спрос = Σ FoodAmount реального ростера (крупные едят больше); скорости голода в данных нет
    const perPlot=(this.o.foodPerPlot||110)*(this.o.research?1.5:1.0);
    let appetite=this.rosterAppetite();
    appetite+=Math.max(0,slots-this.crew.reduce((a,c)=>a+c[1],0))*4.6;
    const plots=Math.max(2,Math.ceil(appetite/perPlot));
    const saladOk=this.o.tech>=((this.structs["Tomato Plantation"]||{}).tech_level||99);
    let n=0;
    if(saladOk){ const st=this.best(["Cooking Pot","Electric Kitchen","Large-Scale Stone Oven","Ancient Kitchen"]);
      const pairs=Math.max(1,Math.ceil(plots/2));
      this.addPlantations({Tomato:pairs,Lettuce:pairs},{Tomato:"Tomato Plantation",Lettuce:"Lettuce Plantation"});
      this.add(st,1); n=pairs*2;
      this.hireBest("Kindling",3,1,"ЕДА: повар салатов");
      const af=this.o.tech>=78&&this.structs["Ancient Farm"];
      const per=af?Math.max(1,Math.ceil(pairs/(this.o.ancientFarmYield||3))):pairs;
      this.notes.push(`ЕДА (self): Salad — ${per}x Tomato + ${per}x Lettuce (${af?"Ancient Farm":"плантаций"}), повар на ${st}`);
    } else { this.addPlantations({"Red Berries":plots},{"Red Berries":"Berry Plantation"}); this.add("Campfire",1); n=plots;
      this.hireBest("Kindling",2,1,"ЕДА: жарка ягод");
      this.notes.push(`ЕДА (self): Baked Berries — ${plots}x Berry Plantation (апгрейд до Salad на tech 25)`); }
    if(!shareCrew){ const crew=Math.max(1,Math.ceil(n/(this.o.plantsPerWorker*this.q())));
      this.hireBest("Planting",3,crew,"ЕДА: посадка"); this.hireBest("Watering",3,crew,"ЕДА: полив");
    } else this.notes.push("Кормовые грядки обслуживает общая тройка базы (отдельные рабочие не нужны)");
    this.assume.push(`Еда: спрос ${appetite.toFixed(0)} аппетит-единиц (Σ FoodAmount ростера) → ${n} грядок (~${perPlot}/грядку; скорости голода в данных нет)`);
    return n; }
  infra(slots){
    let beds=["Straw Pal Bed","Fluffy Pal Bed","Large Pal Bed","Pal Pod","Ancient Pal Pod"],
        sps=["Hot Spring","High Quality Hot Spring","Ancient Hot Spring"];
    if(!this.o.lux){ beds=beds.slice(0,2); sps=sps.slice(0,2); }
    this.add(this.best(beds),slots);
    const sp=this.best(sps), nsp=Math.max(1,Math.ceil(slots/25));
    this.add(sp,nsp); this.assume.push(`${sp} x${nsp}: ~1 на 25 палов (SAN падает медленно, палы по очереди) — подстрой по факту SAN`);
    this.add("Feed Box",Math.max(2,Math.floor(slots/20))); this.add("Palbox",1);
    this.add(this.best(["Medieval Medicine Workbench","Medicine Workbench","Electric Medicine Workbench"]),1);
    const cl=this.best(["Clinic","Ancient Clinic"]); if(cl) this.add(cl,1);
    if(!this.tryDual("Medicine",3,"медик")) this.hireBest("Medicine",1,1,"медик"); }
  tryDual(task,minLv,label){
    // навесить вторую роль на саппорт-пала с нужным навыком (аура работает while at base)
    for(const c of this.crew){ const role=c[3]===undefined?c[2]:c[2];
      if((c[2]||"").startsWith("саппорт") && !(c[2]||"").includes(" + ")){
        const lv=((D.idx.pals[c[0]]||{}).work||{})[task]||0;
        if(lv>=minLv){ c[2]=`${c[2]}  + ${label} (${task} ${lv})`; return true; } } }
    return false; }
  power(heavy){
    const gen=this.best(["Human-Powered Generator","Power Generator","Large Power Generator","Ancient Power Generator"]);
    this.add(gen,heavy?2:1);
    if(gen!=="Human-Powered Generator"){ const n=heavy?2:1;
      const got=this.tryDual("Generating_Electricity",4,"электрик");
      if(n-(got?1:0)>0) this.hireBest("Generating_Electricity",6,n-(got?1:0),"электрик"); }
    if(heavy&&this.best(["Accumulator"])) this.add("Accumulator",2); }
  chainCalc(name, ratePerH, acc){
    // раскладка рецепта до плантаций/ранча/привозного; acc={plants,ranch,imports,crafts}
    const PLANTS={"Red Berries":"Berry Plantation","Wheat":"Wheat Plantation","Tomato":"Tomato Plantation",
      "Lettuce":"Lettuce Plantation","Potato":"Potato Plantation","Carrot":"Carrot Plantation","Onion":"Onion Plantation"};
    const ranchMap=D.idx.inverted.ranch_produce;
    const expand=(n,perH,depth=0)=>{
      if(PLANTS[n]) acc.plants[n]=(acc.plants[n]||0)+perH;
      else if(ranchMap[n]) acc.ranch[n]=(acc.ranch[n]||0)+perH;
      else if(depth<5&&itemByName[n]?.recipe){ acc.crafts[n]=(acc.crafts[n]||0)+perH;
        for(const [m,q] of Object.entries(itemByName[n].recipe.materials)) expand(m,q*perH,depth+1); }
      else acc.imports[n]=(acc.imports[n]||0)+perH; };
    const it=itemByName[name];
    if(it?.recipe) for(const [m,q] of Object.entries(it.recipe.materials)) expand(m,q*ratePerH);
    return acc;
  }
  breedingStaffFor(farms){
    const o=this.o, cake=o.cake||"Cake";
    const eggsPerCake=cake==="Vegetable Cake"?2:1;
    const cakes=farms*60/(o.eggInterval||D.bb.rates.breeding_egg_interval_minutes)*(o.eggBoost||1.0);
    const acc=this.chainCalc(cake,cakes,{plants:{},ranch:{},imports:{},crafts:{}});
    const rr=o.ranchRate*this.ranchMult(), ranchMap=D.idx.inverted.ranch_produce;
    const ranch={};
    for(const [prod,perH] of Object.entries(acc.ranch)) ranch[ranchMap[prod][0]]=Math.ceil(perH/rr);
    const plantsN={}; let totPl=0;
    for(const [crop,perH] of Object.entries(acc.plants)){ plantsN[crop]=Math.ceil(perH/this.plantYieldEff()); totPl+=plantsN[crop]; }
    const trio=3*Math.ceil(totPl/(o.plantsPerWorker*this.gardenMult()));
    const ops=cakes+Object.values(acc.crafts).reduce((a,b)=>a+b,0)-(acc.crafts.Flour||0);
    const cooks=Math.max(1,Math.ceil(ops/(o.cookRate*this.q())));
    const mills=acc.crafts.Flour?Math.max(1,Math.ceil(acc.crafts.Flour/60)):0;
    const heads=2*farms+Object.values(ranch).reduce((a,b)=>a+b,0)+trio+cooks+mills;
    return {cakes,eggs:cakes*eggsPerCake,acc,ranch,plantsN,trio,cooks,mills,heads}; }
  presetBreeding(){
    const o=this.o;
    // решатель: макс. ферм, чей ПОЛНЫЙ план (с транспортом/едой/саппортом) влезает в слоты
    if(o.farms){ this._breedingBuild(o.farms); return; }
    let farms=1; this._breedingBuild(1);
    while(farms<40){ if(this._breedingBuild(farms+1)<=o.slots) farms++; else { this._breedingBuild(farms); break; } }
  }
  _breedingBuild(farms){
    const o=this.o, hatch=o.tech>=76&&this.structs["Ancient Hatchery"], farm=hatch?"Ancient Hatchery":"Breeding Farm";
    this.buildings={}; this.crew=[]; this.notes=[]; this.assume=[];
    const L=this.breedingStaffFor(farms);
    const sup=[["base_defense","ПВО базы от рейдов"]];
    if(o.braloha!==false) sup.unshift(["egg_speed","яйца +20~50%"]);
    if(o.incubation>0) sup.push(["incubation","инкубация -20~40%"]);
    else this.notes.push("Инкубация мгновенная (мир = 0): инкубаторы и Dynamoff не нужны");
    this.supportCore(sup.concat([["crop_growth","рост культур +50~70%"],
      ["crop_yield","урожай +18~35%"],["sanity_save","SAN -10~15% утечка"],
      ["suitability:Watering","+1 Watering всем (Amione)"],["suitability:Planting","+1 Planting всем (Petallia)"],
      ["suitability:Gathering","+1 Gathering всем (Clovee) — тройка"],["suitability:Farming","+1 Farming всем (Cinnamoth) — ранч"]]));
    this.hire("Woolipop Terra",1,"саппорт: голод -15~25% + Caramel Cotton Candy");
    this.add(farm,farms); this.hire("(пары родителей)",2*farms,`в ${farm} x${farms}`);
    const rm=D.idx.inverted.ranch_produce;
    for(const [sp,n] of Object.entries(L.ranch)){
      const prod=Object.keys(L.acc.ranch).find(p=>rm[p][0]===sp)||"?";
      this.hire(sp,n,`ранч: ${prod} (${(L.acc.ranch[prod]||0).toFixed(0)}/час)`); }
    this.add("Ranch",Math.ceil(Object.values(L.ranch).reduce((a,b)=>a+b,0)/4));
    const PL={"Red Berries":"Berry Plantation","Wheat":"Wheat Plantation","Tomato":"Tomato Plantation",
      "Lettuce":"Lettuce Plantation","Potato":"Potato Plantation","Carrot":"Carrot Plantation","Onion":"Onion Plantation"};
    this.addPlantations(L.plantsN, PL);
    if(L.mills){ this.add("Mill",L.mills); this.hireBest("Watering",4,L.mills,"мельница"); }
    for(const [n,perH] of Object.entries(L.acc.imports))
      this.notes.push(`⚠ привозное для торта «${o.cake||"Cake"}»: ${n} x${perH.toFixed(0)}/час`);
    const cakeStation=itemByName[o.cake||"Cake"]?.recipe?.station||"Cooking Pot";
    const kit=this.structs[cakeStation]&&(this.structs[cakeStation].tech_level||0)<=o.tech?cakeStation:
      this.best(["Cooking Pot","Electric Kitchen","Large-Scale Stone Oven","Ancient Kitchen"]);
    this.add(kit,L.cooks); this.hireBest("Kindling",4,L.cooks,`повар тортов (${o.cake||"Cake"})`);
    // кормовые грядки до тройки — одна тройка покрывает и торт, и салат
    const foodPlots=o.food==="self"?this.foodModule(o.slots,true):0;
    if(o.food!=="self") this.notes.push("Еда привозная — вози Salad/Pizza guild chest'ом");
    const cakePlots=Object.values(L.plantsN).reduce((a,b)=>a+b,0);
    const tr=Math.max(1,Math.ceil((cakePlots+foodPlots)/(o.plantsPerWorker*this.gardenMult())));
    this.hireBest("Planting",3,tr,`посадка (все ${cakePlots+foodPlots} грядок)`);
    this.hireBest("Watering",3,tr,"полив (все грядки)"); this.hireBest("Gathering",3,tr,"сбор (все грядки)");
    this.hireTransport();
    if(!hatch&&o.incubation>0){

  presetMineCraft(){

    staff(mSites,"Mining",6,"добыча"); staff(lSites,"Lumbering",5,"лесопилка");
    if(sites.length) this.notes.push(`Добыча: ${perSt} пал(ов) на станцию (у шахт до 3 мест — больше палов = быстрее добыча). 1 = все станции работают, но не на макс. скорости`);
    this.add(this.best(["Primitive Furnace","Improved Furnace","Electric Furnace","Gigantic Furnace","Ancient Furnace"]),2);
    this.hireBest("Kindling",6,2,"печи");
    if(o.tech>=67&&this.structs["Ancient Workbench"]){

      this.notes.push("Ancient Workbench (67, 2000⚡/с) x2: крафтит ВСЁ включая материалы — заменяет production/weapon/sphere линии; требует Handiwork И Medicine 6+");

    // Flame/Electric Organ — узкое место под Computer, поэтому по 2; Pal Oil тоже x2

         ["Kelpsea",1,"Aquatic Pal Fluids (Cement, Coolant)"],["Foxcicle",1,"Ice Organ — Farming 3 (Coolant)"]]

  presetFood(){
    const o=this.o;
    const dishes=o.dishes||[{dish:o.dish||"Salad",rate:o.dishRate}];
    for(const d of dishes) this.foodChain(d.dish,d.rate);
    this.hireTransport(); this.infra(o.slots);
    if(dishes.some(d=>this.structs[itemByName[d.dish]?.recipe?.station]?.power)) this.power(false);
    this.assume.push(`Плантация ${o.plantYield}/час; ранч ${o.ranchRate}/час; кухня ${o.cookRate} оп/час на повара`);
  }
  foodChain(dish, rate){
    const o=this.o;
    const fd=D.bb.foods.find(f=>f.name===dish), it=itemByName[dish];
    if(!fd||!it||!it.recipe){ this.notes.push(`Блюдо '${dish}' не найдено/без рецепта — выбери в селекторе`); return; }
    this.notes.push(`Блюдо: ${dish} [${fd.category}] — сытость ${fd.nutrition}, SAN +${fd.sanity}${fd.buffs?", "+fd.buffs.join(", "):""}; цель ${rate} блюд/час`);
    const PLANTS={"Red Berries":"Berry Plantation","Wheat":"Wheat Plantation","Tomato":"Tomato Plantation",
      "Lettuce":"Lettuce Plantation","Potato":"Potato Plantation","Carrot":"Carrot Plantation","Onion":"Onion Plantation"};
    const ranchMap=D.idx.inverted.ranch_produce;
    const plants={},ranch={},imports={},crafts={};
    const expand=(name,perH,depth=0)=>{
      if(PLANTS[name]) plants[name]=(plants[name]||0)+perH;
      else if(ranchMap[name]) ranch[name]=(ranch[name]||0)+perH;
      else if(depth<5&&itemByName[name]?.recipe){ crafts[name]=(crafts[name]||0)+perH;
        for(const [m,q] of Object.entries(itemByName[name].recipe.materials)) expand(m,q*perH,depth+1); }
      else imports[name]=(imports[name]||0)+perH; };
    for(const [m,q] of Object.entries(it.recipe.materials)) expand(m,q*rate);
    const plantsN={};
    for(const [crop,perH] of Object.entries(plants)){
      if(this.best([PLANTS[crop]])||(o.tech>=78&&this.structs["Ancient Farm"])) plantsN[crop]=Math.ceil(perH/this.plantYieldEff());
      else imports[crop]=(imports[crop]||0)+perH; }
    const totalPl=this.addPlantations(plantsN, PLANTS);
    if(totalPl){
      const trio=Math.ceil(totalPl/(o.plantsPerWorker*this.q()));
      this.hireBest("Planting",3,trio,"посадка"); this.hireBest("Watering",3,trio,"полив"); this.hireBest("Gathering",3,trio,"сбор");
      this.supportCore([["crop_growth","Lullu"],["crop_yield","Prunelia"],["suitability:Planting","+1 Planting"],["suitability:Watering","+1 Watering"]]); }
    let ranchers=0;
    for(const [prod,perH] of Object.entries(ranch)){
      const sp=ranchMap[prod][0], n=Math.ceil(perH/(o.ranchRate*this.ranchMult()));
      this.hire(sp,n,`ранч: ${prod} (${perH.toFixed(0)}/час)`); ranchers+=n; }
    if(ranchers){ this.add("Ranch",Math.ceil(ranchers/4)); this.supportCore([["suitability:Farming","+1 Farming всем"]]); }
    if(plants["Wheat"]||crafts["Flour"]){ this.add("Mill",Math.max(1,Math.ceil((crafts["Flour"]||0)/60))); this.hireBest("Watering",4,1,"мельница"); }
    const station=it.recipe.station;
    if(station&&this.structs[station]){
      const ops=Object.values(crafts).reduce((a,b)=>a+b,0)+rate;
      const nK=Math.max(1,Math.ceil(ops/(o.cookRate*this.q())));
      this.add(station,nK); this.hireBest("Kindling",4,nK,`повар (${dish} + полуфабрикаты, ${ops.toFixed(0)} оп/час)`); }
    for(const [n,perH] of Object.entries(imports)) this.notes.push(`⚠ привозной ингредиент: ${n} x${perH.toFixed(0)}/час (плантации нет — охота/рыбалка/закупка)`);
    for(const [n,perH] of Object.entries(crafts)) this.notes.push(`полуфабрикат: ${n} x${perH.toFixed(0)}/час (на месте)`); }
  presetStarter(){
    this.o.tech=Math.min(this.o.tech,20);
    for(const [s,n] of [["Palbox",1],["Wooden Chest",3],["Feed Box",1],["Ranch",1],["Berry Plantation",2],["Wheat Plantation",1],
      ["Mill",1],["Primitive Furnace",1],["Cooking Pot",1],["Human-Powered Generator",1],["Hot Spring",2],["Straw Pal Bed",15]])
      if(this.structs[s]) this.add(s,n);
    this.hire("Chikipi",1,"ранч: яйца"); this.hire("Mozzarina",1,"ранч: молоко");
    this.hireBest("Kindling",2,1,"печь/готовка"); this.hireBest("Handiwork",2,2,"верстаки");
    this.hireBest("Planting",2,1,"посадка"); this.hireBest("Watering",2,1,"полив"); this.hireBest("Transporting",2,2,"переноска"); }
  run(){
    ({breeding:()=>this.presetBreeding(),"mine-craft":()=>this.presetMineCraft(),
      food:()=>this.presetFood(),starter:()=>this.presetStarter(),
      free:()=>{ this.notes.push("Свободное творчество: собирай базу вручную — «+ здание» и пикер палов справа"); }})[this.o.preset]();
    return this; }
  html(){
    const total=this.crew.reduce((a,[,c])=>a+c,0), o=this.o;
    const num=s=>(D.idx.pals[s]||{}).number;
    let h=`<div class="card"><div class="big">${o.preset} — ${total}/${o.slots} слотов` +
      (total>o.slots?` <span class="bad">перебор на ${total-o.slots}!</span>`:` <span class="ok">свободно ${o.slots-total}</span>`)+`</div></div>`;
    h+=`<div class="card"><h3>Палы</h3><table>`+this.crew.map(([sp,c,r])=>{
      const link = D.idx.pals[sp] ? palLink(sp) : esc(sp);
      return `<tr><td class="mono">${c}x</td><td>${link}</td><td class="dim">${esc(r)}</td></tr>`;}).join("")+`</table></div>`;
    const bill={};
    h+=`<div class="card"><h3>Здания</h3><table>`+Object.entries(this.buildings).sort().map(([b,c])=>{
      const s=this.structs[b]||{}, mats=s.materials||{};
      for(const [m,q] of Object.entries(mats)) bill[m]=(bill[m]||0)+q*c;
      return `<tr><td class="mono">${c}x</td><td>${esc(b)}${s.power?" ⚡":""}</td><td class="dim">tech ${s.tech_level??"?"}</td>
        <td class="dim">${Object.entries(mats).map(([m,q])=>`${esc(m)} x${q*c}`).join(", ")}</td></tr>`;}).join("")+`</table>
      <h3 style="margin-top:10px">Итого материалов</h3><div>`+
      Object.entries(bill).sort().map(([m,q])=>`<span class="tag">${itemLink(m)} x${q}</span>`).join("")+`</div></div>`;
    if(this.notes.length) h+=`<div class="card"><h3>Заметки</h3><ul>${this.notes.map(n=>`<li>${esc(n)}</li>`).join("")}</ul></div>`;
    if(this.assume.length) h+=`<div class="card"><h3>Допущения (подстрой в полях выше)</h3><ul class="dim">${this.assume.map(n=>`<li>${esc(n)}</li>`).join("")}</ul></div>`;
    return h; }
}

];
const TASK_LIST = ["Kindling","Watering","Planting","Generating_Electricity","Handiwork","Gathering",
  "Lumbering","Mining","Medicine","Cooling","Transporting","Farming"];
function familyOf(name){ return FAMILIES.find(f=>f.includes(name)) || [name]; }
function structTasks(s){
  if(s.worker_req) return s.worker_req.tasks.map(t=>t.replace("Generating Electricity","Generating_Electricity").replace("Medicine Production","Medicine"));
  const w=(s.workers||"")+"";
  return TASK_LIST.filter(t=>w.toLowerCase().includes(t.replace("_"," ").toLowerCase()));
}
function topWorkers(task, n=8, easyOnly=false, minLv=1){
  const ranked=D.idx.inverted.work[task]||[];
  const plan=new BasePlan({roster:"top"});
  return ranked.filter(([nm,lv])=>lv>=minLv&&(!easyOnly||plan.easyGet(nm))).slice(0,n);
}

let BASE = {buildings:[], crew:[]};
let openB=null, openC=null, baseDirty=false, collapsedGroups=new Set();

function seedFromPreset(){
  const o=builderOpts();
  const plan=new BasePlan(o).run();
  BASE.buildings=Object.entries(plan.buildings).map(([name,count])=>({name,count}));
  BASE.crew=plan.crew.map(([sp,count,role,task])=>({sp,count,role,task,
    for:/ранч/i.test(role||"")?"Ranch":undefined}));
  BASE.notes=plan.notes; BASE.assume=plan.assume;
  openB=openC=null; baseDirty=false;
  const hint=document.getElementById("rebuild-hint"); if(hint) hint.style.display="none";
  drawBase();
}
function builderOpts(){
  const val=id=>document.getElementById(id).value;
  const metal=val("pmetal");
  if(metal) document.getElementById("ptech").value=METALS[metal];
  return {preset:val("pp"),slots:+val("pslots")||50,tech:+val("ptech")||60,food:val("pfood"),
    workforce:val("pwf"),roster:val("proster"),lux:document.getElementById("plux").checked,
    stars:document.getElementById("pstars").checked,research:document.getElementById("presearch").checked,
    ranchRate:+val("pranch")||12,plantYield:+val("pyield")||60,cookRate:+val("pcook")||30,
    plantsPerWorker:3,farms:+val("pfarms")||null,dish:val("pdish")||"Salad",dishRate:+val("pdishrate")||30,

}

/* --- персист настроек и базы (localStorage) --- */
const PSTORE="palkb_planner_v1";
const PFIELDS=["pp","pslots","pmetal","ptech","pfood","pwf","proster","plux","pstars","presearch",
  "pranch","pyield","pcook","pfarms","pdish","pdishrate","peggint","pbraloha","pincub","pcake",
  "ppers","pspoil","pfpp","pfbuff","pafy"];
function savePlannerState(){
  try{
    const fields={};
    for(const id of PFIELDS){ const el=document.getElementById(id); if(!el) continue;
      fields[id]=el.type==="checkbox"?el.checked:el.value; }
    localStorage.setItem(PSTORE, JSON.stringify({fields, dishes:plannerDishes,
      base:BASE, dirty:baseDirty, collapsed:[...collapsedGroups]}));
  }catch(e){}
}
function restorePlannerState(){
  try{
    const raw=localStorage.getItem(PSTORE); if(!raw) return;
    const s=JSON.parse(raw);
    for(const [id,v] of Object.entries(s.fields||{})){ const el=document.getElementById(id); if(!el) continue;
      if(el.type==="checkbox") el.checked=!!v; else el.value=v; }
    plannerDishes=s.dishes||[];
    if(s.base&&((s.base.buildings||[]).length||(s.base.crew||[]).length)){ BASE=s.base; baseDirty=!!s.dirty; }
    collapsedGroups=new Set(s.collapsed||[]);
  }catch(e){}
}
function resetPlannerState(){ try{ localStorage.removeItem(PSTORE); }catch(e){} location.reload(); }

let plannerDishes=[]; // [{dish, rate}] — несколько рецептов для еда-хаба
function addDish(){
  const d=document.getElementById("pdish").value, r=+document.getElementById("pdishrate").value||30;
  if(d){ plannerDishes.push({dish:d,rate:r}); drawDishChips();
    if(!baseDirty&&BASE.buildings.length) seedFromPreset(); }
}
function delDish(i){ plannerDishes.splice(i,1); drawDishChips(); if(!baseDirty&&BASE.buildings.length) seedFromPreset(); }
function drawDishChips(){
  const el=document.getElementById("dishchips");
  if(el) el.innerHTML=plannerDishes.map((d,i)=>
    `<span class="tag">${esc(d.dish)} x${d.rate}/ч <span class="clicky" onclick="delDish(${i})">✕</span></span>`).join("");
}

  const producers=Object.entries(D.idx.pals)
    .filter(([n,p])=>(p.ranch_produce||[]).length&&(!q||n.toLowerCase().includes(q.toLowerCase())||
      p.ranch_produce.join(" ").toLowerCase().includes(q.toLowerCase())))
    .sort((a,b)=>(b[1].work.Farming||0)-(a[1].work.Farming||0));
  return `<div class="card" style="margin-top:6px;border-color:var(--acc)">
    <div class="row" style="justify-content:space-between">
      <b>${replaceIdx==null?"Добавить пала на ранчо":"Заменить: "+esc(BASE.crew[replaceIdx].sp)}</b>
      <span class="tag clicky" onclick="ranchPick=null;drawBase()">✕</span></div>
    <input type="text" placeholder="поиск по палу или продукту (milk, wool…)" value="${esc(q)}" id="rpq"
      oninput="ranchPick.q=this.value;drawBase();(function(){const e=document.getElementById('rpq');if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length);}})();"
      style="margin:6px 0">
    <div style="max-height:300px;overflow-y:auto"><table>${producers.map(([n,p])=>
      `<tr><td>${palIcon(n)}${palLink(n)}${sizeBadge(n)}${p.nocturnal?" 🌙":""}</td>
       <td>${els(P[n]||{})}</td>
       <td class="dim">${esc((p.ranch_produce||[]).join(", "))}</td>
       <td class="mono">F${p.work.Farming||"-"}</td>
       <td class="dim">${plan.easyGet(n)?"":"🔒"}</td>
       <td><span class="tag clicky" onclick="ranchAssign(${i},'${n.replace(/'/g,"\\'")}')">${replaceIdx==null?"добавить":"выбрать"}</span></td></tr>`).join("")}
    </table></div></div>`;
}
function ranchAssign(i, sp){
  const cap=BASE.buildings[i].count*4;
  const used=BASE.crew.filter(c=>c.for==="Ranch").reduce((a,c)=>a+c.count,0);
  if(ranchPick.replaceIdx!=null){
    BASE.crew[ranchPick.replaceIdx].sp=sp;
    BASE.crew[ranchPick.replaceIdx].role=`ранч: ${((D.idx.pals[sp]||{}).ranch_produce||[]).join(", ")}`;
  } else {
    if(used>=cap) return;
    const ex=BASE.crew.find(c=>c.for==="Ranch"&&c.sp===sp);
    if(ex) ex.count++;
    else BASE.crew.push({sp,count:1,role:`ранч: ${((D.idx.pals[sp]||{}).ranch_produce||[]).join(", ")}`,task:"Farming",for:"Ranch"});
  }
  baseDirty=true; ranchPick=null; drawBase();
}
let pickerFor=null; // {i, task, forB, minLv}
function openPalPicker(i, task, forB, minLv){
  pickerFor = (pickerFor && pickerFor.i===i && pickerFor.task===task) ? null : {i, task, forB, minLv, q:"", easy:false};
  drawBase();
}
function palPickerHtml(){
  if(!pickerFor) return "";
  const {task, forB, minLv, q, easy, size}=pickerFor;
  const plan=new BasePlan({roster:"top"});
  const list=(D.idx.inverted.work[task]||[]).filter(([nm,lv])=>lv>=1&&(!easy||plan.easyGet(nm))
    &&(!q||nm.toLowerCase().includes(q.toLowerCase()))
    &&(!size||(D.idx.pals[nm]||{}).size===size));
  return `<div class="card" style="margin-top:6px;border-color:var(--acc)">
    <div class="row" style="justify-content:space-between">
      <b>Выбор пала: ${task.replace("_"," ")} для «${esc(forB)}»</b>
      <span class="tag clicky" onclick="pickerFor=null;drawBase()">✕ закрыть</span></div>
    <div class="row" style="margin:6px 0">
      <input type="text" placeholder="поиск…" value="${esc(q)}"
        oninput="pickerFor.q=this.value;drawBase();(function(){const e=document.getElementById('ppq');if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length);}})();" id="ppq">
      <label class="dim"><input type="checkbox" ${easy?"checked":""}
        onchange="pickerFor.easy=this.checked;drawBase()"> легко достать</label>
      <select onchange="pickerFor.size=this.value;drawBase()">
        <option value="">размер: любой</option>
        ${["XS","S","M","L","XL"].map(z=>`<option ${size===z?"selected":""}>${z}</option>`).join("")}</select>
      ${minLv>1?`<span class="warn">здание требует уровень ${minLv}+</span>`:""}</div>
    <div style="max-height:300px;overflow-y:auto"><table>${list.slice(0,60).map(([nm,lv])=>
      `<tr${lv<minLv?' style="opacity:.45"':''}><td>${palIcon(nm)}${palLink(nm)}${sizeBadge(nm)}${(D.idx.pals[nm]||{}).nocturnal?" 🌙":""}</td>
       <td>${els(P[nm]||{})}</td>
       <td class="mono">${lv}</td>
       <td class="dim">${plan.easyGet(nm)?"дикий спавн":"сложный"}</td>
       <td><span class="tag clicky" onclick="builderHire('${nm.replace(/'/g,"\\'")}','${task}','${forB.replace(/'/g,"\\'")}')">нанять</span></td></tr>`).join("")}
    </table></div></div>`;
}
function swapTier(i, newName){
  const structs=Object.fromEntries(D.bb.structures.map(x=>[x.name,x]));
  const capOf=n=>{ const m=/(\d+)\s*egg/.exec(structs[n]?.capacity||""); return m?+m[1]:null; };
  const oldCap=capOf(BASE.buildings[i].name), newCap=capOf(newName);
  if(oldCap&&newCap&&oldCap!==newCap){
    const oldCount=BASE.buildings[i].count;
    BASE.buildings[i].count=Math.max(1,Math.ceil(oldCount*oldCap/newCap));
    BASE.notes=BASE.notes||[];
  }
  BASE.buildings[i].name=newName; openB=null; baseDirty=true; drawBase();
}
function builderAddBuilding(){
  const n=document.getElementById("baddb").value.trim();
  const hit=D.bb.structures.find(s=>s.name.toLowerCase()===n.toLowerCase());
  if(hit){ const ex=BASE.buildings.find(b=>b.name===hit.name);
    if(ex) ex.count++; else BASE.buildings.push({name:hit.name,count:1});
    baseDirty=true; drawBase(); }
}
function builderHire(sp,task,forB){
  const ex=BASE.crew.find(c=>c.sp===sp&&c.task===task&&c.for===forB);
  if(ex) ex.count++; else BASE.crew.push({sp,count:1,role:`для: ${forB}`,task,for:forB});
  baseDirty=true; drawBase();
}
function builderFire(sp,task,forB){
  const i=BASE.crew.findIndex(c=>c.sp===sp&&c.task===task&&c.for===forB);
  if(i>=0){ if(--BASE.crew[i].count<1) BASE.crew.splice(i,1); baseDirty=true; drawBase(); }
}
function builderShowPicker(){
  const task=document.getElementById("ptask").value, minLv=+document.getElementById("pminlv").value||1,
        easy=document.getElementById("peasy").checked;
  const list=topWorkers(task,999,easy,minLv);
  document.getElementById("picker").innerHTML=`<div class="card" style="max-height:300px;overflow-y:auto">
    <table>${list.map(([nm,lv])=>`<tr><td>${palLink(nm)}</td><td class="mono">${task.replace("_"," ")} ${lv}</td>
      <td class="dim">${new BasePlan({roster:"top"}).easyGet(nm)?"дикий спавн":"сложный"}</td>
      <td><span class="tag clicky" onclick="builderHire('${nm.replace(/'/g,"\\'")}','${task}','вручную')">нанять</span></td></tr>`).join("")}
    </table></div>`;
}

loadAll().then(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("view").style.display="";
  document.getElementById("view").addEventListener("input",saveTabField);
  document.getElementById("view").addEventListener("change",saveTabField);
  const st=history.state||{};
  const h=st.tab||location.hash.slice(1);
  if(render[h]) cur=h;
  nav(); render[cur](); restoreTabState(cur);
  if(st.pal&&cur==="pal") showPal(st.pal,false);
  else if(st.item&&cur==="items") showItem(st.item,false);
  try{ history.replaceState({...st,tab:cur}, "", "#"+cur); }catch(e){}
}).catch(e=>{
  document.getElementById("loading").innerHTML=`<span class="bad">Ошибка загрузки данных: ${esc(e.message)}</span><br>
  Открой через локальный сервер: <code>python3 -m http.server 8842</code> из корня проекта → <code>http://localhost:8842/web/</code>`;
});
</script>
</body>
